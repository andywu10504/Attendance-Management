<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>出勤管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { background:#f8f9fa; }
    .section-box { border:1px solid #dee2e6; border-radius:.5rem; background:#fff; }
    .clock-time { font-size: 3rem; font-weight: 700; line-height: 1; }
    .clock-date { color:#6c757d; font-size: .95rem; }
    .action-btn { min-height:72px; font-size:1.25rem; }
    .table-wrap { max-height: 360px; overflow: auto; }
  </style>
</head>
<body>
  <div class="container-fluid p-0">
    <!-- 第一區：Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary section-box rounded-0 border-start-0 border-end-0 border-top-0">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><i class="fa-solid fa-calendar-check me-2"></i>出勤管理</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item me-3"><span class="nav-link"><i class="fa-solid fa-building me-1"></i><span id="unitText">-</span></span></li>
            <li class="nav-item me-3"><span class="nav-link"><i class="fa-solid fa-user-tie me-1"></i><span id="titleText">-</span></span></li>
            <li class="nav-item me-3"><span class="nav-link"><i class="fa-solid fa-user me-1"></i><span id="nameText">-</span></span></li>
          </ul>
          <button id="switchUserBtn" class="btn btn-outline-primary"><i class="fa-solid fa-repeat me-1"></i>切換</button>
        </div>
      </div>
    </nav>

    <div class="container py-3">
      <div class="row g-3">
        <div class="col-12">
          <!-- 第二區：時鐘 -->
          <section class="section-box p-3 text-center">
            <div class="clock-time" id="clockTime">--:--:--</div>
            <div class="clock-date" id="clockDate">----</div>
          </section>
        </div>

        <div class="col-12">
          <!-- 第三區：定位狀態 -->
          <section class="section-box p-3 d-flex justify-content-between align-items-center">
            <div><i class="fa-solid fa-location-dot me-2"></i>定位狀態：<span id="gpsStatus" class="fw-semibold">尚未定位</span></div>
            <button id="checkGpsBtn" class="btn btn-sm btn-outline-secondary">重新定位</button>
          </section>
        </div>

        <div class="col-12">
          <!-- 第四區：提示狀態區 -->
          <section id="statusArea" class="section-box p-3 d-none"></section>
        </div>

        <div class="col-md-4">
          <!-- 第五區：簽到簽退按鈕 -->
          <section class="section-box p-3 h-100 d-grid gap-2">
            <button id="checkInBtn" class="btn btn-success action-btn"><i class="fa-solid fa-right-to-bracket me-2"></i>簽到</button>
            <button id="checkOutBtn" class="btn btn-danger action-btn"><i class="fa-solid fa-right-from-bracket me-2"></i>簽退</button>
          </section>
        </div>

        <div class="col-md-8">
          <!-- 第六區：時數統計 -->
          <section class="section-box p-3 h-100">
            <div class="row g-3">
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="text-muted">本月協勤時數</div>
                  <div class="fs-3 fw-bold" id="monthHours">0.00</div>
                </div>
              </div>
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="text-muted">總協勤時數</div>
                  <div class="fs-3 fw-bold" id="totalHours">0.00</div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <div class="col-12">
          <!-- 第七區：出勤紀錄表格 -->
          <section class="section-box p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">出勤紀錄</h5>
              <a href="export.html" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-file-export me-1"></i>匯出</a>
            </div>
            <div class="table-wrap">
              <table class="table table-striped table-bordered align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>勤務類別</th>
                    <th>簽到日期</th>
                    <th>簽到時間</th>
                    <th>簽退日期</th>
                    <th>簽退時間</th>
                    <th>時數(小時)</th>
                  </tr>
                </thead>
                <tbody id="recordTableBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <!-- 簽到模態框 -->
  <div class="modal fade" id="checkInModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fa-solid fa-right-to-bracket me-2"></i>簽到確認</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">工作內容</label>
            <textarea id="checkInWorkContent" class="form-control" rows="3" placeholder="請輸入工作內容"></textarea>
          </div>
          <div class="small text-muted">簽名檔請先上傳到 Google Drive，輸入連結。</div>
          <input id="checkInSignUrl" type="url" class="form-control mt-2" placeholder="簽名檔 Drive URL">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="confirmCheckInBtn" type="button" class="btn btn-success">確認簽到</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 簽退模態框 -->
  <div class="modal fade" id="checkOutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fa-solid fa-right-from-bracket me-2"></i>簽退確認</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          確定要簽退嗎？系統將自動更新最後一筆未簽退紀錄。
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button id="confirmCheckOutBtn" type="button" class="btn btn-danger">確認簽退</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="index.js"></script>
</body>
</html>
