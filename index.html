<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>出勤管理系統</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background: #f8f9fa;
      }
      .section-box {
        border: 1px solid #ced4da;
        border-radius: 0.5rem;
        background: #fff;
      }
      .clock-time {
        font-size: 3rem;
        font-weight: 700;
        line-height: 1.1;
      }
      .clock-date {
        color: #6c757d;
      }
      .action-btn {
        min-height: 72px;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <!-- 第一區：頂部 Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top border-bottom">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">出勤管理</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto gap-2 align-items-lg-center">
            <li class="nav-item"><span class="nav-link"><i class="bi bi-building"></i> <span id="unitText">單位</span></span></li>
            <li class="nav-item"><span class="nav-link"><i class="bi bi-person-badge"></i> <span id="titleText">職稱</span></span></li>
            <li class="nav-item"><span class="nav-link"><i class="bi bi-person"></i> <span id="nameText">姓名</span></span></li>
            <li class="nav-item">
              <button id="switchUserBtn" class="btn btn-outline-primary btn-sm">切換</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-3">
      <div class="row g-3">
        <!-- 第二區：時間日期 -->
        <div class="col-12">
          <section class="section-box p-3 text-center">
            <div id="clockTime" class="clock-time">--:--:--</div>
            <div id="clockDate" class="clock-date small">----/--/--</div>
          </section>
        </div>

        <!-- 第三區：狀態提示 -->
        <div class="col-12">
          <section id="statusSection" class="section-box p-3 d-none">
            <div id="statusAlert" class="alert mb-0" role="alert"></div>
          </section>
        </div>

        <!-- 第四區：簽到簽退按鈕 -->
        <div class="col-12">
          <section class="section-box p-3">
            <div class="d-grid gap-3">
              <button id="checkInBtn" class="btn btn-success action-btn" data-bs-toggle="modal" data-bs-target="#checkInModal">簽到</button>
              <button id="checkOutBtn" class="btn btn-danger action-btn" data-bs-toggle="modal" data-bs-target="#checkOutModal">簽退</button>
            </div>
          </section>
        </div>

        <!-- 第五區：時數統計 -->
        <div class="col-12">
          <section class="section-box p-3">
            <div class="row g-3 text-center">
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="small text-muted">本月協勤時數</div>
                  <div id="monthHours" class="fs-4 fw-bold">0.00</div>
                </div>
              </div>
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="small text-muted">總協勤時數</div>
                  <div id="totalHours" class="fs-4 fw-bold">0.00</div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- 第六區：出勤紀錄 -->
        <div class="col-12">
          <section class="section-box p-3">
            <h2 class="h6 mb-3">出勤紀錄</h2>
            <div class="table-responsive">
              <table class="table table-striped table-bordered align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>勤務類別</th>
                    <th>簽到日期</th>
                    <th>簽到時間</th>
                    <th>簽退日期</th>
                    <th>簽退時間</th>
                  </tr>
                </thead>
                <tbody id="recordsTableBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </main>

    <!-- 簽到模態框 -->
    <div class="modal fade" id="checkInModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">簽到確認</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-2">確認送出簽到？</p>
            <div id="checkInGpsStatus" class="small text-muted">GPS 驗證中...</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button id="confirmCheckInBtn" type="button" class="btn btn-success">確認簽到</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 簽退模態框 -->
    <div class="modal fade" id="checkOutModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">簽退確認</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="mb-2">確認送出簽退？</p>
            <div id="checkOutGpsStatus" class="small text-muted">GPS 驗證中...</div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button id="confirmCheckOutBtn" type="button" class="btn btn-danger">確認簽退</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
