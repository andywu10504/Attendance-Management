<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>新興救護義消出勤管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { background:#f8f9fa; }
    .section-box { border:1px solid #dee2e6; border-radius:.5rem; background:#fff; }
    .clock-panel { background:#000; color:#fff; border-radius:.5rem; }
    .clock-time { font-size: 3rem; font-weight: 700; line-height: 1; }
    .clock-date { color:#d1d5db; font-size: .95rem; }
    .action-btn { min-height:72px; font-size:1.25rem; }
    .table-wrap { max-height: 360px; overflow: auto; }
    .loading-mask {
      position: fixed; inset: 0; background: rgba(255,255,255,.7);
      display: none; align-items: center; justify-content: center; z-index: 1060;
    }
  </style>
</head>
<body>
  <div class="loading-mask" id="loadingMask">
    <div class="text-center">
      <div class="spinner-border text-primary" role="status"></div>
      <div class="mt-2 fw-semibold">資料讀取中...</div>
    </div>
  </div>

  <div class="container-fluid p-0">
    <nav class="navbar bg-body-tertiary section-box rounded-0 border-start-0 border-end-0 border-top-0">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="navbar-brand mb-0 fw-bold">新興救護義消出勤管理系統</div>
        <div class="d-flex align-items-center gap-3">
          <span><i class="fa-solid fa-building me-1"></i><span id="unitText">-</span></span>
          <span><i class="fa-solid fa-user-tie me-1"></i><span id="titleText">-</span></span>
          <span><i class="fa-solid fa-user me-1"></i><span id="nameText">-</span></span>
          <button id="switchUserBtn" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-repeat me-1"></i>切換</button>
        </div>
      </div>
    </nav>

    <div class="container py-3">
      <div class="row g-3">
        <div class="col-12">
          <section class="section-box p-3 text-center clock-panel">
            <div class="clock-time" id="clockTime">--:--:--</div>
            <div class="clock-date" id="clockDate">----</div>
          </section>
        </div>

        <div class="col-12">
          <section class="section-box p-3 d-flex justify-content-between align-items-center">
            <div><i class="fa-solid fa-location-dot me-2"></i>定位狀態：<span id="gpsStatus" class="fw-semibold">尚未定位</span></div>
            <button id="checkGpsBtn" class="btn btn-sm btn-outline-secondary">重新定位</button>
          </section>
        </div>

        <div class="col-12">
          <section id="statusArea" class="section-box p-3 d-none"></section>
        </div>

        <div class="col-md-4">
          <section class="section-box p-3 h-100 d-grid gap-2">
            <button id="checkInBtn" class="btn btn-success action-btn"><i class="fa-solid fa-right-to-bracket me-2"></i>簽到</button>
            <button id="checkOutBtn" class="btn btn-danger action-btn"><i class="fa-solid fa-right-from-bracket me-2"></i>簽退</button>
          </section>
        </div>

        <div class="col-md-8">
          <section class="section-box p-3 h-100">
            <div class="row g-3">
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="text-muted">本月協勤時數</div>
                  <div class="fs-3 fw-bold" id="monthHours">0.00</div>
                  <div class="progress mt-2" role="progressbar" aria-label="本月目標 12 小時" aria-valuemin="0" aria-valuemax="12">
                    <div id="monthProgress" class="progress-bar" style="width: 0%">0%</div>
                  </div>
                  <small class="text-muted">每月目標 12 小時</small>
                </div>
              </div>
              <div class="col-6">
                <div class="border rounded p-3 h-100">
                  <div class="text-muted">總協勤時數</div>
                  <div class="fs-3 fw-bold" id="totalHours">0.00</div>
                </div>
              </div>
            </div>
          </section>
        </div>

        <div class="col-12">
          <section class="section-box p-3">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
              <h5 class="mb-0 fw-bold">出勤紀錄</h5>
              <input id="recordMonth" type="month" class="form-control form-control-sm" style="max-width: 180px;">
            </div>
            <div class="table-wrap">
              <table class="table table-striped table-bordered align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>勤務類別</th>
                    <th>簽到日期</th>
                    <th>簽到時間</th>
                    <th>簽退日期</th>
                    <th>簽退時間</th>
                    <th>時數(小時)</th>
                  </tr>
                </thead>
                <tbody id="recordTableBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="switchUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">切換人員</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label">單位</label><input id="switchUnit" class="form-control" readonly></div>
          <div class="mb-2"><label class="form-label">職稱</label><input id="switchTitle" class="form-control" readonly></div>
          <div><label class="form-label">姓名</label><select id="switchName" class="form-select"></select></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button id="confirmSwitchBtn" class="btn btn-primary">確認切換</button></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="checkInModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">簽到</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label">協勤種類</label><select id="inDutyType" class="form-select"><option>協勤</option><option>常年訓練</option><option>公差勤務</option></select></div>
          <div class="mb-2"><label class="form-label">職稱</label><input id="inTitle" class="form-control" readonly></div>
          <div class="mb-2"><label class="form-label">姓名</label><select id="inName" class="form-select"></select></div>
          <div class="mb-2"><label class="form-label">簽到日期</label><input id="inDate" type="date" class="form-control"></div>
          <div><label class="form-label">簽到時間(半小時)</label><select id="inTime" class="form-select"></select></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button id="confirmCheckInBtn" type="button" class="btn btn-success">確認簽到</button></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="checkOutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">簽退</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label">協勤種類</label><select id="outDutyType" class="form-select"><option>協勤</option><option>常年訓練</option><option>公差勤務</option></select></div>
          <div class="mb-2"><label class="form-label">服勤類別</label><select id="outServiceType" class="form-select"><option>待命協勤</option><option>出勤</option></select></div>
          <div class="mb-2"><label class="form-label">職稱</label><input id="outTitle" class="form-control" readonly></div>
          <div class="mb-2"><label class="form-label">姓名</label><select id="outName" class="form-select"></select></div>
          <div class="mb-2"><label class="form-label">簽退日期</label><input id="outDate" type="date" class="form-control"></div>
          <div class="mb-2"><label class="form-label">簽退時間(半小時)</label><select id="outTime" class="form-select"></select></div>
          <div class="mb-2"><label class="form-label">工作內容(出勤與公差勤務需填寫)</label><textarea id="outWorkContent" class="form-control" rows="2"></textarea></div>
          <div><label class="form-label">簽名(Drive URL)</label><input id="outSignUrl" type="url" class="form-control"></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button id="confirmCheckOutBtn" type="button" class="btn btn-danger">確認簽退</button></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="index.js"></script>
</body>
</html>
